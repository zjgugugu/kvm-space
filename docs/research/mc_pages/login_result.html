  jQuery(function($) {
    KSVD.updatei18nMap({
      titleConfirm: "确认",
      titleInfo: "提示",
      titleWarn: "警告",
      titleError: "错误",
      ok: "确定",
      OK: "确定",
      cancel : "取消",
      save: "保存",
      username_null: "用户名输入不能为空",
      password_null: "密码输入不能为空",
      password_change_title: "修改密码",
      currentPassword_wrong: "当前用户登录密码错误",
      verify_code_error: "验证码错误"
    });
    var mcRoot = "/mc/";
    KSVD.appCtx = "/mc/";
    KSVD.initLogo(mcRoot);
    KSVD.initGlobalSettings();
    $("input:submit").on("click", function () {
      var remember_me = $("#remember_me");
      if (remember_me.prop('checked')) {
        $.cookie("rmbUser", "true", {expires: 7}); //存储一个带7天期限的cookie
        $.cookie("username", btoa($('#username').val()), {expires: 7});
        $.cookie("password", btoa($('#password').val()), {expires: 7});
      }
      else {
        $.cookie("rmbUser", "false", {expire: -1});
        $.cookie("username", "", {expires: -1});
        $.cookie("password", "", {expires: -1});
      }
    })

    //获取cookie的值
    var username = atob($.cookie('username') || '');
    var password = atob($.cookie('password') || '');

    //将获取的值填充入输入框中
    $('#username').val(username);
    $('#password').val(password);
    if (username != null && username != '' && password != null && password != '') {
      //选中保存密码的复选框
      $("#remember_me").attr('checked', true);
    }

     $('.jqk-toggle-btn').click(function() {
        $('#jqk-toggle-btn').click()
     })
    //软键盘
    jqKeyboard.init();
  });
  
</script>
