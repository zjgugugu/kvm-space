                helpContentCpumode:"兼容模式：虚拟化模拟通用的标准虚拟CPU, 兼容性好，但没有为云服务器提供最优性能。主机匹配模式：虚拟化模拟与物理服务器CPU最接近的CPU型号，能够尽可能地找到CPU性能参数相近的cpu型号，但在不同的cpu服务器上，找出的型号也不相同，对迁移的兼容性较差。直通模式：将服务器主机CPU型号和大部分功能能透传给云服务器。可为云服务器提供最优性能，但迁移兼容性很差，在同一厂家不同代的CPU之间也可能不支持迁移",
                helpContentDiskType:"virtio类型的磁盘能够大幅提升云服务器的磁盘IO性能，但是某些版本的操作系统不支持，可能会导致安装系统时找不到磁盘，建议遇到此问题时，修改成ide磁盘再安装；最多可加载24个virtio类型的磁盘或者不超过4个的ide类型的设备（包括光驱，光驱为ide设备）",
                helpContentCacheType:"none:关闭主机缓存，数据从虚拟磁盘缓存中读写; writethrough:关闭虚拟磁盘写缓存，数据直接被写入磁盘。只有磁盘读缓存; writeback: 数据在写入磁盘之前，首先写入缓存，写缓存成功之后，写操作就认为已经完成，数据并没有立即同步到磁盘; unsafe:与writeback相似，但其忽视了刷新缓存指令，从而无法保证虚拟机镜像的数据一致性，故性能得到了提升;directsync：关闭主机和虚拟磁盘缓存，直接读写物理磁盘。注意：由于writethrough、writeback、none，在服务器异常断电下，可能导致数据来不及刷新到物理磁盘而丢失，建议使用默认的直接读写(directsync)模式",
                helpContentProvisionType:"厚置备将预先分配磁盘空间，可以将提升磁盘性能，但会占用较多的存储空间，且不支持快照备份；简置备则会按实际数据占用大小，需要时再分配存储空间",
