

<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <title>管理控制台： {0}</title>
    <link rel="stylesheet" type="text/css" href="/mc/css/console_master.css" />
    <script type="text/javascript">

        jQuery(document).ready(function() {
            KSVD.updatei18nMap({
                proxyName:"代理名称",
                proxyServer:"服务器地址",
                proxyPort:"服务器端口",
                deleteConfirm:"您确定要删除所选代理服务器吗？"
            });
            KSVD.videoRedirect.initProxyServerSettings();
        });
    
</script>

</head>

<body>
    <div class="body">
        <div class="tblControls">
            <button id="addProxyServer" class="btn kylin-green" style="margin-top: 5px">

            </button>
